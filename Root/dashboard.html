<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bankify - Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <section class="view-container app-layout">
      <aside class="sidebar">
        <div class="sidebar-logo">Bankify</div>
        <nav class="nav-links">
          <a href="dashboard.html" class="nav-item active"
            ><svg class="icon">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
            Dashboard</a
          >
          <a href="reports.html" class="nav-item"
            ><svg class="icon">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
              <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
            </svg>
            Reports</a
          >
          <a href="add-transaction.html" class="nav-item"
            ><svg class="icon">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            Add Transaction</a
          >
        </nav>
        <div class="sidebar-bottom">
          <div class="user-profile">
            <div class="user-avatar">MA</div>
            <div style="flex: 1">
              <div class="font-semibold" style="font-size: 14px">User</div>
              <div class="text-secondary" style="font-size: 12px">
                user@bankify.test
              </div>
            </div>
          </div>
          <a href="index.html" class="nav-item text-red">Log out</a>
        </div>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <h1 class="page-title">Dashboard Overview</h1>
        </header>
        <div class="cards-grid">
          <div class="stat-card">
            Expenses
            <div class="stat-amount" id="total-expense">0 Mad</div>
          </div>
          <div class="stat-card">
            Income
            <div class="stat-amount" id="total-income">0 Mad</div>
          </div>
          <div class="stat-card stat-card-blue">
            Total Balance
            <div class="stat-amount" id="total-balance">0 Mad</div>
          </div>
        </div>
        <div class="table-section">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Amount</th>
                  <th>Category</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="transactions-tbody">
                <tr>
                  <td
                    colspan="4"
                    class="text-secondary"
                    style="text-align: center"
                  >
                    No records found.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </section>
  </body>
</html>
