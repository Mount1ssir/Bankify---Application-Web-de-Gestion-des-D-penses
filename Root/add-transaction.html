<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bankify - Add Transaction</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="view-container app-layout">
      <aside class="sidebar">
        <div class="sidebar-logo">Bankify</div>
        <nav class="nav-links">
          <a href="dashboard.html" class="nav-item">Dashboard</a>
          <a href="reports.html" class="nav-item">Reports</a>
          <a href="add-transaction.html" class="nav-item active"
            >Add Transaction</a
          >
        </nav>
        <div class="sidebar-bottom">
          <a href="index.html" class="nav-item text-red">Log out</a>
        </div>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <h1 class="page-title">Add New Transaction</h1>
        </header>
        <div class="embedded-form-card">
          <form id="add-transaction-form">
            <div style="text-align: center; margin-bottom: 32px">
              <div class="segmented-control" id="add-type-toggle">
                <button
                  type="button"
                  class="segment-btn active"
                  data-type="Expense"
                >
                  Expense Tracking
                </button>
                <button type="button" class="segment-btn" data-type="Income">
                  Income Entry
                </button>
              </div>
            </div>
            <div class="form-group large-input">
              <label>Amount</label>
              <input
                type="number"
                id="txt-amount"
                class="form-control"
                placeholder="0.00"
                required
              />
            </div>
            <div class="grid-form">
              <div class="form-group">
                <label>Category</label>
                <select id="txt-category" class="form-control" required>
                  <option value="Groceries">Groceries</option>
                  <option value="Salary">Salary</option>
                </select>
              </div>
              <div class="form-group">
                <label>Date</label>
                <input
                  type="date"
                  id="txt-date"
                  class="form-control"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn-primary">RECORD</button>
          </form>
        </div>
      </main>
    </section>
  </body>
</html>
