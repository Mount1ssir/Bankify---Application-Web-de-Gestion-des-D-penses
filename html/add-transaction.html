<header class="page-header">
  <h1 class="page-title">Add New Transaction</h1>
  <p class="text-secondary" style="margin-top: 4px">
    Record your financial moves quickly and specifically.
  </p>
</header>

<div class="embedded-form-card">
  <form id="add-transaction-form">
    <div style="text-align: center; margin-bottom: 32px">
      <div class="segmented-control" id="add-type-toggle">
        <button type="button" class="segment-btn active" data-type="Expense">
          Expense Tracking
        </button>
        <button type="button" class="segment-btn" data-type="Income">
          Income Entry
        </button>
      </div>
    </div>

    <div class="form-group large-input">
      <label style="text-align: center">Amount</label>
      <input
        type="number"
        id="txt-amount"
        class="form-control"
        placeholder="0.00"
        step="0.01"
        required
      />
    </div>

    <div class="grid-form">
      <div class="form-group" style="margin-bottom: 0">
        <label>Category</label>
        <select id="txt-category" class="form-control" required>
          <option value="">Select Category</option>
          <option value="Groceries">Groceries</option>
          <option value="Utilities">Utilities</option>
          <option value="Dining">Dining</option>
          <option value="Salary">Salary</option>
          <option value="Rent">Rent</option>
          <option value="Others">Others</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom: 0">
        <label>Date</label>
        <input type="date" id="txt-date" class="form-control" required />
      </div>
    </div>

    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea
        id="txt-notes"
        class="form-control"
        placeholder="Write something regarding this transaction..."
        rows="3"
      ></textarea>
    </div>

    <div
      class="form-actions"
      style="
        margin-top: 24px;
        display: flex;
        justify-content: flex-end;
        gap: 16px;
      "
    >
      <button type="button" class="btn-secondary" id="btn-cancel-add-bottom">
        Clear Fields
      </button>
      <button
        type="submit"
        class="btn-primary"
        id="btn-submit-add"
        style="width: auto; min-width: 150px"
      >
        + RECORD
      </button>
    </div>
  </form>
</div>
